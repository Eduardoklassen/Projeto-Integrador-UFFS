<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Descrição para mecanismos de busca -->
  <meta name="description" content="Acesso ao sistema de gestão e controle de estoque da Nino Klassen Artefatos de Concreto.">
  <title>Login — Nino Klassen Artefatos</title>


  <link rel="icon" type="image/png" href="assets/img/favicon.png">

  <!-- CSS: ordem de carregamento importa — reset  variáveis base  -->
  <link rel="stylesheet" href="css/base/reset.css">
  <link rel="stylesheet" href="css/base/variables.css">
  <link rel="stylesheet" href="css/base/global.css">
  <link rel="stylesheet" href="css/components/button.css">
  <link rel="stylesheet" href="css/components/input.css">
  <link rel="stylesheet" href="css/components/card.css">
  <link rel="stylesheet" href="css/pages/login.css">
</head>
<body>

  <!-- main: conteúdo principal e único da página. A classe "login" cuida só do layout (centralizar na tela). -->
  <main class="login">

    <div class="card login__caixa">

      <!-- header semântico em vez de div (handout HTML, seção 6.1) -->
      <header class="card__cabecalho">
        <div class="card__logo">NK</div>
        <h1 class="card__titulo">Nino Klassen</h1>
        <p class="card__subtitulo">Sistema de Controle de Estoque</p>
      </header>

      <!-- Alerta de erro/sucesso. role="alert" para leitores de tela. -->
      <div id="alerta" class="login__alerta" role="alert"></div>

      <!-- novalidate: desliga a validação nativa do navegador para
           usarmos a nossa própria (validators.js) -->
      <form id="form-login" class="card__corpo" novalidate>

        <div class="campo">
          <!-- label associado ao input via for/id (handout HTML, seção 5.4) -->
          <label class="campo__label" for="email">E-mail</label>
          <div class="campo__controle">
            <input
              class="campo__input"
              type="email"
              id="email"
              name="email"
              placeholder="seu@email.com"
              autocomplete="username"
              autofocus
            >
          </div>
        </div>

        <div class="campo">
          <label class="campo__label" for="senha">Senha</label>
          <div class="campo__controle">
            <input
              class="campo__input"
              type="password"
              id="senha"
              name="senha"
              placeholder="Sua senha"
              autocomplete="current-password"
            >
            <button type="button" id="toggle-senha" class="campo__toggle">Mostrar</button>
          </div>
        </div>

        <button type="submit" id="btn-entrar" class="btn btn--primario">
          Entrar
        </button>

      </form>

      <a href="#" id="link-esqueci" class="login__esqueci">Esqueci minha senha</a>

      <footer class="card__rodape">
        Projeto Integrador — UFFS · Campus Chapecó
      </footer>

    </div>
  </main>

  <script src="js/config/api.config.js"></script>
  <script src="js/core/storage.js"></script>
  <script src="js/core/http.js"></script>
  <script src="js/core/auth.js"></script>
  <script src="js/utils/validators.js"></script>
  <script src="js/modules/login/login.js"></script>

</body>
</html>
