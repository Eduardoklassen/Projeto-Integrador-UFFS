<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Matérias-primas e insumos da Nino Klassen Artefatos de Concreto.">
  <title>Materiais — Nino Klassen Artefatos</title>
  <link rel="icon" type="image/png" href="assets/img/favicon.png">
  <link rel="stylesheet" href="css/base/reset.css">
  <link rel="stylesheet" href="css/base/variables.css">
  <link rel="stylesheet" href="css/base/global.css">
  <link rel="stylesheet" href="css/layout/app.css">
  <link rel="stylesheet" href="css/components/sidebar.css">
  <link rel="stylesheet" href="css/components/topbar.css">
  <link rel="stylesheet" href="css/components/card.css">
  <link rel="stylesheet" href="css/components/button.css">
  <link rel="stylesheet" href="css/components/toolbar.css">
  <link rel="stylesheet" href="css/components/table.css">
  <link rel="stylesheet" href="css/components/modal.css">
  <link rel="stylesheet" href="css/components/form.css">
  <link rel="stylesheet" href="css/pages/materiais.css">
  <link rel="stylesheet" href="css/base/responsive.css">
</head>
<body>
  <div class="app">
    <aside class="app__sidebar"></aside>
    <header class="app__topbar"></header>
    <main class="app__main">
      <section class="card">
        <div class="toolbar">
          <div class="toolbar__busca">
            <span>⌕</span>
            <input class="toolbar__busca-input" type="text" id="busca" placeholder="Buscar material por nome...">
          </div>
          <div class="toolbar__acoes">
            <select class="toolbar__filtro" id="filtro-status" aria-label="Filtrar por situação">
              <option value="todos">⏷ Filtrar: Todos</option>
              <option value="1">Somente Ativos</option>
              <option value="0">Somente Inativos</option>
            </select>
            <button class="btn btn--primario btn--auto" id="btn-novo">＋ Novo material</button>
          </div>
        </div>
        <div class="tabela-scroll">
          <table class="tabela">
            <thead>
              <tr>
                <th class="tabela__th">Material</th>
                <th class="tabela__th">Unidade</th>
                <th class="tabela__th">Custo unit.</th>
                <th class="tabela__th">Estoque</th>
                <th class="tabela__th">Status</th>
                <th class="tabela__th">Ações</th>
              </tr>
            </thead>
            <tbody id="tabela-materiais"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="js/config/api.config.js"></script>
  <script src="js/core/storage.js"></script>
  <script src="js/core/http.js"></script>
  <script src="js/core/inatividade.js"></script>
  <script src="js/core/auth.js"></script>
  <script src="js/core/layout.js"></script>
  <script src="js/utils/dom.js"></script>
  <script src="js/core/modal.js"></script>
  <script src="js/core/form-modal.js"></script>
  <script src="js/utils/validators.js"></script>
  <script src="js/modules/materiais/materiais.js"></script>
</body>
</html>
